<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>流 · 极简日程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf9f5;
    --ink:#1b1a17;
    --muted:#8a877e;
    --line:#e8e5dd;
    --card:#ffffff;
    --accent:#2f37e6;
    --accent-soft:#eceefe;
    --done:#b6b3aa;
    --danger:#c0392b;
    --r:14px;
    --mono:'Space Grotesk',system-ui,sans-serif;
    --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Space Grotesk',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:1100px;margin:0 auto;padding:28px 22px 140px}

  /* top bar */
  .top{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .brand{font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:-.5px}
  .brand b{color:var(--accent)}
  .tag{color:var(--muted);font-size:13px}
  .sync{margin-left:auto;display:flex;align-items:center;gap:10px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
  .dot.ok{background:#1aa364}.dot.busy{background:var(--accent);animation:pulse 1s infinite}.dot.off{background:var(--done)}
  @keyframes pulse{50%{opacity:.3}}
  .syncl{font-size:12px;color:var(--muted)}
  .gear{border:none;background:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px;border-radius:8px}
  .gear:hover{background:var(--line);color:var(--ink)}

  /* quick add */
  .add{display:flex;gap:10px;margin:22px 0 26px}
  .add input{
    flex:1;border:1.5px solid var(--line);background:var(--card);
    border-radius:var(--r);padding:14px 16px;font-size:16px;font-family:var(--sans);color:var(--ink);
    transition:border-color .15s;
  }
  .add input:focus{outline:none;border-color:var(--accent)}
  .add button{
    border:none;background:var(--ink);color:#fff;border-radius:var(--r);
    padding:0 20px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .add button:active{transform:scale(.97)}

  /* mobile tabs */
  .tabs{display:none;gap:8px;margin-bottom:18px}
  .tabs button{
    flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:12px;
    padding:10px 6px;font-family:var(--sans);cursor:pointer;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;font-size:13px;
  }
  .tabs button .n{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--ink)}
  .tabs button.on{border-color:var(--ink);color:var(--ink)}
  .tabs button.on .n{color:var(--accent)}

  /* columns */
  .board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px;align-items:start}
  .col{background:transparent}
  .colhead{display:flex;align-items:baseline;gap:10px;padding:0 4px 12px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .colhead .num{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--accent);letter-spacing:1px}
  .colhead h2{font-size:16px;font-weight:600}
  .colhead .cnt{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--muted)}
  .list{display:flex;flex-direction:column;gap:9px;min-height:40px}

  .item{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:12px 12px 12px 13px;display:flex;align-items:flex-start;gap:10px;
    min-width:0;will-change:transform;
  }
  .check{
    flex-shrink:0;width:19px;height:19px;border:1.8px solid var(--done);border-radius:50%;
    cursor:pointer;margin-top:1px;position:relative;transition:.15s;
  }
  .check:hover{border-color:var(--accent)}
  .item.done .check{background:var(--accent);border-color:var(--accent)}
  .item.done .check::after{content:"";position:absolute;left:5px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .txt{flex:1;font-size:14.5px;word-break:break-word;cursor:text;padding-top:1px}
  .item.done .txt{color:var(--done);text-decoration:line-through}
  .acts{display:flex;gap:2px;flex-shrink:0;opacity:.55;transition:opacity .15s}
  .item:hover .acts{opacity:1}
  .acts button{
    border:none;background:none;cursor:pointer;color:var(--muted);font-size:15px;
    width:26px;height:26px;border-radius:7px;display:grid;place-items:center;line-height:1;
  }
  .acts button:hover{background:var(--accent-soft);color:var(--accent)}
  .acts button.del:hover{background:#fbeae8;color:var(--danger)}

  /* link card (compact, single line) */
  .item.link{align-items:center}
  .lbody{flex:1;min-width:0;cursor:pointer;display:flex;align-items:center;gap:7px;text-decoration:none;color:inherit}
  .src{flex-shrink:0;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:20px;letter-spacing:.3px}
  .ltitle{flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ltitle.loading{color:var(--muted);font-style:italic}
  .item.done .ltitle{color:var(--done);text-decoration:line-through}
  .lbody:hover .ltitle{color:var(--accent)}
  .item.done .lbody:hover .ltitle{color:var(--done)}
  /* collapsible link group */
  .linkgroup{margin-top:9px}
  .lghead{display:flex;align-items:center;gap:8px;padding:10px 13px;border:1px dashed var(--line);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--muted);user-select:none}
  .lghead:hover{border-color:var(--accent);color:var(--accent)}
  .lghead .arw{font-family:var(--mono);font-size:15px;transition:transform .2s;display:inline-block}
  .linkgroup.open .lghead{border-style:solid}
  .linkgroup.open .lghead .arw{transform:rotate(90deg)}
  .lghead .lgcount{margin-left:auto;font-family:var(--mono);font-weight:600}
  .lgbody{display:none;flex-direction:column;gap:9px;margin-top:9px}
  .linkgroup.open .lgbody{display:flex}
  .donegroup .lghead{opacity:.7}
  .donegroup .item{opacity:.6}
  .tidy{align-self:flex-start;margin-bottom:4px;border:1px dashed var(--line);background:none;color:var(--accent);border-radius:10px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--sans)}
  .tidy:hover{border-color:var(--accent);background:var(--accent-soft)}
  .cluster{display:flex;flex-direction:column;gap:9px}
  .cluster+.cluster{margin-top:4px}
  .clabel{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;margin:6px 0 1px;padding-left:2px}
  /* PC-only hover summary */
  @media(hover:hover){
    .lbody[data-desc]{position:relative}
    .lbody[data-desc]:hover::after{
      content:attr(data-desc);position:absolute;left:0;top:calc(100% + 7px);z-index:20;
      background:var(--ink);color:#fff;font-size:12.5px;line-height:1.55;font-weight:400;
      padding:9px 12px;border-radius:9px;max-width:340px;width:max-content;white-space:normal;
      box-shadow:0 10px 30px rgba(0,0,0,.2);pointer-events:none;
    }
  }

  .empty{color:var(--done);font-size:13px;padding:14px 4px;text-align:center;border:1px dashed var(--line);border-radius:var(--r)}
  .colfoot{margin-top:12px}
  .clear{width:100%;border:1px solid var(--line);background:none;color:var(--muted);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;font-family:var(--sans)}
  .clear:hover{border-color:var(--accent);color:var(--accent)}

  /* settings sheet */
  .mask{position:fixed;inset:0;background:rgba(20,18,15,.4);display:none;z-index:50}
  .mask.show{display:block}
  .sheet{
    position:fixed;z-index:51;background:var(--card);border-radius:18px;padding:26px;
    width:min(420px,calc(100% - 32px));top:50%;left:50%;transform:translate(-50%,-50%);
    display:none;box-shadow:0 24px 60px rgba(0,0,0,.18)
  }
  .sheet.show{display:block}
  .sheet h3{font-family:var(--mono);font-size:18px;margin-bottom:4px}
  .sheet p.sub{color:var(--muted);font-size:13px;margin-bottom:18px;line-height:1.6}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .field input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--mono);color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--accent)}
  .field small{display:block;color:var(--muted);font-size:12px;margin-top:5px}
  .srow{display:flex;gap:10px;margin-top:20px}
  .srow button{flex:1;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1.5px solid var(--line);background:var(--card);color:var(--ink)}
  .srow button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .copyid{font-family:var(--mono);font-size:12px;background:var(--accent-soft);color:var(--accent);padding:8px 10px;border-radius:8px;word-break:break-all;cursor:pointer}
  .sheet.review{max-height:80vh;overflow-y:auto}
  .rday{margin-bottom:18px}
  .rday h4{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:8px}
  .ritem{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
  .ritem .rsrc{flex-shrink:0;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:1px 6px;border-radius:20px}
  .ritem .rt{flex:1;min-width:0;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ritem button{flex-shrink:0;border:none;background:none;cursor:pointer;color:var(--muted);font-size:15px;width:28px;height:28px;border-radius:7px}
  .ritem button:hover{background:var(--accent-soft);color:var(--accent)}
  .rempty{color:var(--done);font-size:13px;text-align:center;padding:24px 0}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:720px){
    .wrap{padding:20px 16px 120px}
    .tabs{display:flex}
    .board{grid-template-columns:minmax(0,1fr);gap:0}
    .col{display:none}.col.active{display:block}
    .colhead{display:none}
    .add{position:fixed;bottom:0;left:0;right:0;margin:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--paper);border-top:1px solid var(--line);z-index:40}
    .acts{opacity:1}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">流<b>.</b></div>
    <div class="tag">想到 → 收集 → 收束到今天</div>
    <div class="sync">
      <span class="dot off" id="dot"></span>
      <span class="syncl" id="syncl">本地</span>
      <button class="gear" id="reviewBtn" aria-label="回顾" title="回顾">⟲</button>
      <button class="gear" id="gear" aria-label="设置">⚙</button>
    </div>
  </div>

  <div class="add">
    <input id="qadd" placeholder="想到什么，或粘个链接稍后读…" autocomplete="off">
    <button id="qbtn">收集</button>
  </div>

  <div class="tabs">
    <button data-tab="inbox" class="on"><span class="n" id="t-inbox">0</span>收集箱</button>
    <button data-tab="week"><span class="n" id="t-week">0</span>本周</button>
    <button data-tab="today"><span class="n" id="t-today">0</span>今日</button>
  </div>

  <div class="board" id="board"></div>
</div>

<div class="mask" id="mask"></div>
<div class="sheet review" id="review">
  <h3>回顾</h3>
  <p class="sub">已完成的事，按天归档。点 ↩ 可把任意一条重新捞回收集箱继续跟进。</p>
  <div id="review-body"></div>
</div>
<div class="sheet" id="sheet">
  <h3>云同步设置</h3>
  <p class="sub">用 <b>JSONBin.io</b> 免费同步。到 jsonbin.io 注册，复制 <b>Master Key</b> 填这里。首次保存会自动创建数据；想在第二台设备互通，把下面生成的 Bin ID 填到那台设备即可。</p>
  <div class="field">
    <label>Master Key</label>
    <input id="f-key" placeholder="$2a$10$..." autocomplete="off">
  </div>
  <div class="field">
    <label>Bin ID（可留空，自动生成）</label>
    <input id="f-bin" placeholder="留空则自动创建" autocomplete="off">
    <small id="bin-hint"></small>
  </div>
  <div class="srow">
    <button id="s-clear">关闭同步</button>
    <button id="s-save" class="primary">保存并同步</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LISTS=[['inbox','01','收集箱'],['week','02','本周任务'],['today','03','今日任务']];
const NEXT={inbox:'week',week:'today'};
const PREV={today:'week',week:'inbox'};
const NAME={inbox:'收集箱',week:'本周',today:'今日'};
let tasks=[];
let cfg={key:'',bin:''};
let ui={};
let curTab='inbox';
let saveTimer=null;

/* ---------- storage ---------- */
function loadLocal(){
  try{tasks=JSON.parse(localStorage.getItem('flow_tasks')||'[]')}catch(e){tasks=[]}
  try{cfg=JSON.parse(localStorage.getItem('flow_cfg')||'{}')||{}}catch(e){cfg={}}
  try{ui=JSON.parse(localStorage.getItem('flow_ui')||'{}')||{}}catch(e){ui={}}
  cfg.key=cfg.key||'';cfg.bin=cfg.bin||'';
}
function saveUI(){try{localStorage.setItem('flow_ui',JSON.stringify(ui))}catch(e){}}
function saveLocal(){try{localStorage.setItem('flow_tasks',JSON.stringify(tasks))}catch(e){warnStorage()}}
function saveCfg(){try{localStorage.setItem('flow_cfg',JSON.stringify(cfg))}catch(e){warnStorage()}}
let _warned=false;
function warnStorage(){if(_warned)return;_warned=true;setTimeout(()=>toast('此环境无法本地保存，请用 Safari/Chrome 正常打开（避免无痕或微信内置浏览器）'),300)}

/* ---------- cloud (JSONBin) ---------- */
function setDot(state,label){
  const d=document.getElementById('dot');d.className='dot '+state;
  document.getElementById('syncl').textContent=label;
}
async function pull(){
  if(!cfg.key||!cfg.bin)return;
  setDot('busy','同步中');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.bin}/latest`,{headers:{'X-Master-Key':cfg.key}});
    if(!r.ok)throw 0;
    const j=await r.json();
    if(Array.isArray(j.record)){tasks=j.record;saveLocal();render()}
    setDot('ok','已同步');
  }catch(e){setDot('off','离线')}
}
function scheduleSave(){
  saveLocal();
  if(!cfg.key||!cfg.bin){setDot('off','本地');return}
  clearTimeout(saveTimer);
  setDot('busy','同步中');
  saveTimer=setTimeout(push,900);
}
async function push(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.bin}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':cfg.key},
      body:JSON.stringify(tasks)
    });
    if(!r.ok)throw 0;
    setDot('ok','已同步');
  }catch(e){setDot('off','离线')}
}
async function createBin(){
  const r=await fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':cfg.key,'X-Bin-Private':'true','X-Bin-Name':'flow-tasks'},
    body:JSON.stringify(tasks)
  });
  if(!r.ok)throw 0;
  const j=await r.json();
  return j.metadata.id;
}

/* ---------- render ---------- */
function flip(measure){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){render();return}
  const before={};
  document.querySelectorAll('.item').forEach(el=>before[el.dataset.id]=el.getBoundingClientRect());
  render();
  document.querySelectorAll('.item').forEach(el=>{
    const b=before[el.dataset.id];if(!b)return;
    const a=el.getBoundingClientRect();
    const dx=b.left-a.left,dy=b.top-a.top;
    if(!dx&&!dy)return;
    el.style.transform=`translate(${dx}px,${dy}px)`;el.style.transition='none';
    requestAnimationFrame(()=>{el.style.transition='transform .32s cubic-bezier(.2,.8,.2,1)';el.style.transform=''});
  });
}
function itemHTML(t){
  let acts='';
  if(PREV[t.list])acts+=`<button data-act="prev" title="退回${NAME[PREV[t.list]]}">‹</button>`;
  if(NEXT[t.list])acts+=`<button data-act="next" title="推进到${NAME[NEXT[t.list]]}">›</button>`;
  acts+=`<button class="del" data-act="del" title="删除">×</button>`;
  if(t.type==='link'){
    const loading=t.title===undefined;
    const failed=t.title==='';
    const main=loading?'读取标题中…':(failed?t.url:t.title);
    const tgt=innerWidth<=720?'':' target="_blank" rel="noopener"';
    const dz=t.desc?` data-desc="${esc(t.desc)}"`:'';
    return `<div class="item link${t.done?' done':''}" data-id="${t.id}">
      <div class="check" data-act="done"></div>
      <a class="lbody" href="${esc(t.url)}"${tgt}${dz}>
        <span class="src">${esc(t.src||'链接')}</span><span class="ltitle${loading?' loading':''}">${esc(main)}</span>
      </a>
      <div class="acts">${acts}</div>
    </div>`;
  }
  return `<div class="item${t.done?' done':''}" data-id="${t.id}">
    <div class="check" data-act="done"></div>
    <div class="txt" data-act="edit">${esc(t.text)}</div>
    <div class="acts">${acts}</div>
  </div>`;
}
function render(){
  const board=document.getElementById('board');
  board.innerHTML=LISTS.map(([id,num,title])=>{
    const its=tasks.filter(t=>t.list===id);
    const undone=its.filter(t=>!t.done),dones=its.filter(t=>t.done);
    document.getElementById('t-'+id).textContent=undone.length;
    const todos=undone.filter(t=>t.type!=='link'),links=undone.filter(t=>t.type==='link');
    let body=todos.map(itemHTML).join('');
    if(links.length){
      const open=ui['lg_'+id]?' open':'';
      const tidy=links.length>2?`<button class="tidy" data-tidy="${id}">✦ 按关联整理</button>`:'';
      body+=`<div class="linkgroup${open}" data-lg="${id}"><div class="lghead"><span class="arw">›</span>稍后读<span class="lgcount">${links.length}</span></div><div class="lgbody">${tidy}${linkGroupBody(links)}</div></div>`;
    }
    if(dones.length){
      const open=ui['cg_'+id]?' open':'';
      body+=`<div class="linkgroup donegroup${open}" data-cg="${id}"><div class="lghead"><span class="arw">›</span>已完成<span class="lgcount">${dones.length}</span></div><div class="lgbody">${dones.map(itemHTML).join('')}</div></div>`;
    }
    if(!its.length)body=`<div class="empty">空</div>`;
    return `<section class="col${curTab===id?' active':''}" data-col="${id}">
      <div class="colhead"><span class="num">${num}</span><h2>${title}</h2><span class="cnt">${undone.length}</span></div>
      <div class="list">${body}</div>
    </section>`;
  }).join('');
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- actions ---------- */
const SRC={'xiaoyuzhoufm.com':'小宇宙','mp.weixin.qq.com':'公众号','bilibili.com':'B站','b23.tv':'B站','zhihu.com':'知乎','youtube.com':'YouTube','youtu.be':'YouTube','twitter.com':'X','x.com':'X','github.com':'GitHub','douban.com':'豆瓣','xiaohongshu.com':'小红书','xhslink.com':'小红书','okjike.com':'即刻','jike.city':'即刻','sspai.com':'少数派','notion.so':'Notion','feishu.cn':'飞书','bjp.org.cn':'链接'};
function sourceName(url){
  try{
    const h=new URL(url).hostname.replace(/^www\./,'');
    for(const k in SRC){if(h===k||h.endsWith('.'+k))return SRC[k]}
    return h;
  }catch(e){return '链接'}
}
/* ---- 轻量聚类（零依赖） ---- */
const STOP=new Set(['的','了','是','在','和','与','我','你','他','这','那','一个','一种','如何','怎么','什么','关于','com','www','http','https']);
function tokenize(s){
  s=(s||'').toLowerCase();const toks=[];
  (s.match(/[a-z0-9]{2,}/g)||[]).forEach(w=>{if(!STOP.has(w))toks.push(w)});
  (s.match(/[\u4e00-\u9fa5]+/g)||[]).forEach(seg=>{
    if(seg.length===1){if(!STOP.has(seg))toks.push(seg);return}
    for(let i=0;i<seg.length-1;i++){const g=seg.slice(i,i+2);if(!STOP.has(g))toks.push(g)}
  });
  return toks;
}
function vec(text){const v={};tokenize(text).forEach(t=>v[t]=(v[t]||0)+1);return v}
function cosine(a,b){let dot=0,na=0,nb=0;for(const k in a){na+=a[k]*a[k];if(b[k])dot+=a[k]*b[k]}for(const k in b)nb+=b[k]*b[k];return dot/(Math.sqrt(na)*Math.sqrt(nb)||1)}
function clusterLinks(links){
  const docs=links.map(l=>({l,v:vec((l.title||l.url||'')+' '+(l.desc||''))}));
  const cs=[],TH=0.16;
  docs.forEach(d=>{
    let best=null,bs=TH;
    cs.forEach(c=>{const s=cosine(d.v,c.cent);if(s>bs){bs=s;best=c}});
    if(best){best.items.push(d);for(const k in d.v)best.cent[k]=(best.cent[k]||0)+d.v[k]}
    else cs.push({items:[d],cent:{...d.v}});
  });
  cs.forEach(c=>{
    const f=c.cent;
    const top=Object.keys(f).sort((a,b)=>f[b]-f[a]||b.length-a.length).slice(0,3);
    const label=c.items.length>1?(top[0]||''):'';
    c.items.forEach(d=>d.l.cluster=label);
  });
}
function linkGroupBody(links){
  if(!links.some(l=>l.cluster!==undefined)) return links.map(itemHTML).join('');
  const groups={},order=[];
  links.forEach(l=>{const k=l.cluster||'其他';if(!groups[k]){groups[k]=[];order.push(k)}groups[k].push(l)});
  order.sort((a,b)=>groups[b].length-groups[a].length);
  return order.map(k=>`<div class="cluster">${k?`<div class="clabel">${esc(k)}</div>`:''}${groups[k].map(itemHTML).join('')}</div>`).join('');
}
async function hydrate(id){
  const t=find(id);if(!t||t.type!=='link')return;
  try{
    const r=await fetch('https://api.microlink.io/?url='+encodeURIComponent(t.url));
    const j=await r.json();
    if(j&&j.status==='success'&&j.data){
      t.title=j.data.title||'';
      if(j.data.description)t.desc=j.data.description;
    }else{t.title=''}
  }catch(e){t.title=''}
  render();scheduleSave();
}
function add(text){
  text=text.trim();if(!text)return;
  const base={id:Date.now()+''+Math.random().toString(36).slice(2,6),list:'inbox',done:false};
  const m=text.match(/https?:\/\/[^\s]+/);
  if(m){
    const url=m[0],rest=text.replace(url,'').trim();
    const item={...base,type:'link',url,src:sourceName(url)};
    if(rest)item.title=rest;
    tasks.unshift(item);render();scheduleSave();
    if(!rest)hydrate(item.id);
  }else{
    tasks.unshift({...base,type:'task',text});render();scheduleSave();
  }
}
function find(id){return tasks.find(t=>t.id===id)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600)}

document.getElementById('board').addEventListener('click',e=>{
  if(e.target.matches('[data-tidy]')){
    const id=e.target.dataset.tidy;
    clusterLinks(tasks.filter(t=>t.list===id&&!t.done&&t.type==='link'));
    ui['lg_'+id]=true;saveUI();render();scheduleSave();toast('已按关联整理');return;
  }
  const lgh=e.target.closest('.lghead');
  if(lgh){const g=lgh.parentElement,k=g.dataset.lg?('lg_'+g.dataset.lg):('cg_'+g.dataset.cg);ui[k]=!ui[k];saveUI();g.classList.toggle('open');return}
  const el=e.target.closest('.item');if(!el)return;
  const t=find(el.dataset.id);if(!t)return;
  const act=e.target.dataset.act;
  if(act==='done'){t.done=!t.done;if(t.done)t.doneAt=Date.now();else delete t.doneAt;flip();scheduleSave()}
  else if(act==='next'){t.list=NEXT[t.list];flip();scheduleSave();if(innerWidth<=720)toast('已推进到 '+NAME[t.list])}
  else if(act==='prev'){t.list=PREV[t.list];flip();scheduleSave();if(innerWidth<=720)toast('已退回 '+NAME[t.list])}
  else if(act==='del'){tasks=tasks.filter(x=>x.id!==t.id);flip();scheduleSave()}
  else if(act==='edit'){
    const nv=prompt('编辑',t.text);if(nv!==null&&nv.trim()){t.text=nv.trim();render();scheduleSave()}
  }
});

document.getElementById('qbtn').onclick=()=>{const i=document.getElementById('qadd');add(i.value);i.value='';i.focus()};
document.getElementById('qadd').addEventListener('keydown',e=>{if(e.key==='Enter'){add(e.target.value);e.target.value=''}});

/* mobile tabs */
document.querySelector('.tabs').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  curTab=b.dataset.tab;
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.col').forEach(c=>c.classList.toggle('active',c.dataset.col===curTab));
});

/* settings */
const sheet=document.getElementById('sheet'),mask=document.getElementById('mask');
function openSheet(){
  document.getElementById('f-key').value=cfg.key;
  document.getElementById('f-bin').value=cfg.bin;
  document.getElementById('bin-hint').innerHTML=cfg.bin?`当前 Bin ID（点击复制）：<span class="copyid" id="cid">${cfg.bin}</span>`:'';
  const cid=document.getElementById('cid');
  if(cid)cid.onclick=()=>{navigator.clipboard?.writeText(cfg.bin);toast('已复制 Bin ID')};
  sheet.classList.add('show');mask.classList.add('show');
}
function closeSheet(){sheet.classList.remove('show');mask.classList.remove('show')}
document.getElementById('gear').onclick=openSheet;
mask.onclick=closeAll;
document.getElementById('s-clear').onclick=()=>{cfg={key:'',bin:''};saveCfg();setDot('off','本地');closeSheet();toast('已关闭同步')};
document.getElementById('s-save').onclick=async()=>{
  cfg.key=document.getElementById('f-key').value.trim();
  cfg.bin=document.getElementById('f-bin').value.trim();
  if(!cfg.key){toast('请填 Master Key');return}
  saveCfg();
  setDot('busy','同步中');
  try{
    if(!cfg.bin){cfg.bin=await createBin();saveCfg()}
    await pull();
    setDot('ok','已同步');closeSheet();toast('同步已开启');
  }catch(e){setDot('off','离线');toast('设置已存，但连接失败，检查网络或 Key / Bin ID')}
};

/* review */
function dayKey(ts){
  if(!ts)return '更早';
  const d=new Date(ts),now=new Date();
  const a=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const b=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((a-b)/86400000);
  if(diff<=0)return '今天';if(diff===1)return '昨天';if(diff<7)return diff+' 天前';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function openReview(){
  const done=tasks.filter(t=>t.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
  const groups={},order=[];
  done.forEach(t=>{const k=dayKey(t.doneAt);if(!groups[k]){groups[k]=[];order.push(k)}groups[k].push(t)});
  document.getElementById('review-body').innerHTML=order.length?order.map(k=>`<div class="rday"><h4>${k}</h4>${groups[k].map(t=>{
    const label=t.type==='link'?(t.title||t.url):t.text;
    const src=t.type==='link'?`<span class="rsrc">${esc(t.src||'链接')}</span>`:'';
    return `<div class="ritem" data-rid="${t.id}">${src}<span class="rt">${esc(label)}</span><button data-rback title="捞回收集箱">↩</button></div>`;
  }).join('')}</div>`).join(''):`<div class="rempty">还没有完成的事，先去做点什么。</div>`;
  document.getElementById('review').classList.add('show');mask.classList.add('show');
}
function closeAll(){document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'));mask.classList.remove('show')}
document.getElementById('reviewBtn').onclick=openReview;
document.getElementById('review-body').addEventListener('click',e=>{
  if(!e.target.matches('[data-rback]'))return;
  const row=e.target.closest('.ritem'),t=find(row.dataset.rid);if(!t)return;
  t.done=false;delete t.doneAt;t.list='inbox';
  render();scheduleSave();openReview();toast('已捞回收集箱');
});

/* init */
loadLocal();render();
(async function(){
  if(cfg.key&&cfg.bin){await pull()}else{setDot('off','本地')}
  const a=new URLSearchParams(location.search).get('add');
  if(a){add(a);try{history.replaceState(null,'',location.pathname)}catch(e){}toast('已加入收集箱')}
})();
</script>
